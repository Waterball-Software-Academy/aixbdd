# =============================================================================
# dsl.yml 空範例（SpecFormula DSL 框架標準）
# =============================================================================
# 複製 dsl_steps 下的區塊，逐條填。每條上方以註解標狀態 `# [kw]`，
# 經 refine 確認定義完成後改標 `# [kw] [done]`。欄位 schema：
#   name      : 唯一標籤
#   format    : 業務句；{name} 佔位（推薦）或 ^...$ regex（進階匹配逃生口）
#   params    : 預設值 { key: 值 } 或 DataTable 欄位清單 [ a, b ]；可省略
#   isa_steps : 有序 ISA 指令；instruction 須對上 isa.yml 的某 instruction format
#               table 語法：
#                 {{name}}        內插 format 捕獲值 / params
#                 >{{alias}}.id   把回應欄位存進 context 別名（搭配 '<field'）
#                 ${{alias}}.id   引用先前存的別名
#                 &gt(0) 等        matcher
# =============================================================================

dsl_steps:

  # [kw]
  - name: <唯一標籤>
    format: '"{<參數>}" <業務句>'
    params: {}                              # 或 { <key>: <預設值> } / [ <DataTable欄位>, ... ]
    isa_steps:
      - instruction: '<對上 isa.yml 的指令句>'
        table: {}
          # '<欄位>': '{{<參數>}}'           # 內插
          # '>{{<別名>}}.id': '<<回應欄位>'   # 存別名
          # '<欄位>': '${{<別名>}}.id'        # 引用別名
