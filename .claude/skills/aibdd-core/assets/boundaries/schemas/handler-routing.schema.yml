type: object
required:
  - routes
  - dsl-writing-rules-for-each-part
properties:
  routes:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/route"
  dsl-writing-rules-for-each-part:
    type: object
    additionalProperties: false
    required:
      - state-builder
      - operation-invoke
      - operation-response-success-and-failure
      - operation-response-success-readmodel
      - state-verifier
      - time-control
      - external-stub
    properties:
      state-builder:
        $ref: "#/$defs/handlerContract"
      operation-invoke:
        $ref: "#/$defs/handlerContract"
      operation-response-success-and-failure:
        $ref: "#/$defs/handlerContract"
      operation-response-success-readmodel:
        $ref: "#/$defs/handlerContract"
      state-verifier:
        $ref: "#/$defs/handlerContract"
      time-control:
        $ref: "#/$defs/handlerContract"
      external-stub:
        $ref: "#/$defs/handlerContract"
additionalProperties: false

$defs:
  route:
    type: object
    required:
      - part
      - keyword
      - semantic
      - handler
    properties:
      part:
        type: string
        enum:
          - state-builder
          - operation-invoke
          - operation-response-success-and-failure
          - operation-response-success-readmodel
          - state-verifier
          - time-control
          - external-stub
      keyword:
        type: array
        minItems: 1
        items:
          enum:
            - Given
            - When
            - Then
            - Background
      semantic:
        type: string
      handler:
        type: string
        enum:
          - state-builder
          - operation-invoke
          - operation-response-success-and-failure
          - operation-response-success-readmodel
          - state-verifier
          - time-control
          - external-stub
    additionalProperties: false

  handlerContract:
    type: object
    required:
      - required_source_kinds
      - l4_requirements
    properties:
      required_source_kinds:
        type: array
        minItems: 1
        items:
          type: string
      optional_source_kinds:
        type: array
        items:
          type: string
      l4_requirements:
        type: array
        minItems: 1
        items:
          type: string
    additionalProperties: false
