# =============================================================================
# <boundary-id> preset — step-classification.yml（authoring template）
# =============================================================================
#
# 這張表把每一條 Gherkin step 的 (keyword × sentence-part) 對應到一個語意 handler ID。
# 它是 handler 路由的 SSOT。
#
# 消費者：
#   1. /aibdd-red-execute — step-def 實作時用它把 step 分類到正確 handler。
#   2. /aibdd-spec-by-example-analyze — SBE 句型分類時的參考。
#
# 與其他檔的分工：
#   1. plan-time 構造履約（每個 handler 的 required source 與綁定保證）寫在
#      ../plugin-contract.md。
#   2. runtime 實作履約（context 讀寫、禁令）寫在 handlers/<handler>.md。
#   3. 本檔只管「哪個 step 屬於哪個 handler」這層 routing，不重述上述兩者。
#
# 撰寫規則：
#   1. routes 內每個 handler ID 必須在 handlers/ 有對應 .md（若該 boundary 有 handler 文件）
#      且能被 part_to_dsl.py / red-execute 解析。
#   2. keyword 只列該 part 合法出現的 Gherkin 關鍵字（Given / When / Then / Background）。
#   3. semantic 用一句話講清楚此 handler 負責「驗證什麼 / 準備什麼 / 觸發什麼」，
#      避免和 sibling handler 語意重疊。
# =============================================================================

routes:
  # 每個 route = 一個 handler。複製此區塊，逐 handler 定義。
  - part: <handler-id>          # 對應 handlers/<handler-id>.md 與 part_to_dsl 的 handler 字串
    keyword:                    # 此 part 合法出現的 Gherkin 關鍵字
      - <Given|When|Then|Background>
    handler: <handler-id>       # 通常與 part 同名
    semantic: <一句話：此 handler 負責準備/觸發/驗證什麼，與 sibling 不重疊。>

  # --- 範例（backend 常見 handler 家族，依你的 boundary 增刪）---------------------
  # - part: state-builder
  #   keyword: [Given, Background]
  #   handler: state-builder
  #   semantic: Prepare persisted backend state through repository-level setup.
  # - part: operation-invoke
  #   keyword: [Given, When]
  #   handler: operation-invoke
  #   semantic: Invoke a backend operation through the boundary API.
  # - part: operation-response-success-and-failure
  #   keyword: [Then]
  #   handler: operation-response-success-and-failure
  #   semantic: Verify success/failure/status of the captured operation response.
