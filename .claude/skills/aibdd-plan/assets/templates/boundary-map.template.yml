# Generated or updated by /aibdd-plan
boundary_id: "<boundary-id>"

topology:
  modules: []
  providers: []

rule_dispatch:
  defaults:
    owner_boundary: "<boundary-id>"
    package_scope: "packages/*"
    infer_from:
      - package_path
      - feature_file
      - activity_anchor
      - contract_operation_id
      - package_dsl
    trace_contract:
      package: "packages/<NN-slug>"
      feature: "packages/<NN-slug>/features/*.feature"
      activity: "packages/<NN-slug>/activities/*.activity#STEP:*"
      contract: "contracts/**/*.yml#operations.*"
      dsl: "packages/<NN-slug>/dsl.yml"
  package_examples:
    - package_id: "<NN-slug>"
      package_path: "packages/<NN-slug>"
      operation_catalog:
        - "contracts/<area>.yml#operations"
      source_globs:
        features: "packages/<NN-slug>/features/*.feature"
        activities: "packages/<NN-slug>/activities/*.activity"
        dsl: "packages/<NN-slug>/dsl.yml"
      note: "Example only; do not duplicate every atomic rule."
  overrides:
    - rule_id: "<only-when-default-inference-is-wrong>"
      reason: "<cross-boundary | shared-operation | non-standard-owner>"
      owner_boundary: "<boundary-id>"
      contract_ref: "contracts/<area>.yml#operations.<operation_id>"
      source_refs:
        - "<feature-or-activity-path#anchor>"

dependency_edges:
  - edge_id: "<consumer-to-provider>"
    consumer: "<boundary-or-module>"
    provider: "<provider-boundary-or-third-party>"
    provider_kind: "internal_boundary | third_party"
    contract_ref: "<contracts/path.yml#operation | none>"
    mockable: true
    test_strategy_ref: "<test-strategy.yml#edge>"

persistence_ownership:
  - state_or_entity: "<name>"
    owner_boundary: "<boundary-id>"
    persistence_kind: "<database | file-store | cache | none>"
    verifier_ref: "<data/path.dbml#table.column | none>"
