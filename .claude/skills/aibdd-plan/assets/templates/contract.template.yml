# Provider operation contract truth
provider: "<provider-id>"
provider_kind: "internal_boundary | third_party"

operations:
  - operation_id: "<operation-id>"
    description: "<business purpose>"
    request:
      fields:
        - name: "<field>"
          type: "<type>"
          required: true
          source_ref: "<feature-or-rule-ref>"
    response:
      fields:
        - name: "<field>"
          type: "<type>"
          required: true
          assertion_role: "<success | failure | data>"
    errors:
      - code: "<error-code>"
        meaning: "<business meaning>"
    side_effects:
      - "<state change or provider effect>"
    source_refs:
      - "<boundary-map.yml#edge>"
