- id: "<dsl-entry-id>"
  source:
    rule_id: "<atomic-rule-id>"
    boundary_id: "<boundary-id>"
    feature_path: "<features/path.feature#rule>"
  L1:
    given: "<optional exact Given pattern with {placeholder}>"
    when: "<optional exact When pattern with {placeholder}>"
    then:
      - "<optional exact Then pattern with {expected}>"
  L2:
    context: "<business context>"
    role: "<actor-or-executor>"
    scope: "boundary | system | component"
  L3:
    type: "state-setup | direct-call | state-check | response-check | mock | fixture-upload"
  L4:
    surface_id: "<stable-surface-id>"
    surface_kind: "loader | operation | state-verifier | response-verifier | external-stub | fixture-upload | internal-decision"
    callable_via: "api | cli | adapter | stub-channel | fixture-loader"
    preset:
      name: "web-backend"
      sentence_part: "<same string as handler; see aibdd-core/assets/boundaries/web-backend/handler-routing.yml>"
      handler: "<aggregate-given | http-operation | success-failure | readmodel-then | aggregate-then | time-control | external-stub>"
      variant: "python-e2e"
    param_bindings:
      "<placeholder>":
        kind: "contract_field | data_field | response_path | fixture_path | stub_payload_field | literal"
        target: "<contracts/...#field | data/...#table.column | response:$.field | fixture:path | stub_payload:field | literal:value>"
    datatable_bindings:
      "<datatable-column>":
        kind: "contract_field | data_field | response_path | fixture_path | stub_payload_field | literal"
        target: "<contracts/...#field | data/...#table.column | response:$.field | fixture:path | stub_payload:field | literal:value>"
        override_allowed: true
    default_bindings:
      "<default-name>":
        kind: "contract_field | data_field | response_path | fixture_path | stub_payload_field | literal"
        target: "<contracts/...#field | data/...#table.column | response:$.field | fixture:path | stub_payload:field | literal:value>"
        value: "<business-common default value>"
        reason: "<atomic-rule justification: why varying this value does not affect the majority behavior under test>"
        override_via: "datatable | disallowed"
    assertion_bindings:
      "<expected-name>":
        kind: "contract_field | data_field | response_path | fixture_path | stub_payload_field | literal"
        target: "<contracts/...#field | data/...#table.column | response:$.field | fixture:path | stub_payload:field | literal:value>"
    source_refs:
      contract: "<contracts/path.yml#operation | null>"
      data: "<data/path.dbml#table.column | null>"
      boundary: "<boundary-map.yml#rule_dispatch.defaults | boundary-map.yml#rule_dispatch.overrides.<id> | null>"
      test_strategy: "<test-strategy.yml#edge | null>"
    fixture:
      catalog_ref: "<fixture catalog/path | null>"
      missing_file_behavior: "<raise | default-empty | skip | null>"
