version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: aixbdd-test-backend-postgres
    environment:
      POSTGRES_DB: aixbdd_test_backend_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
